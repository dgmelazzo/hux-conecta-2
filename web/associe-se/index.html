<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Associe-se — ACIC-DF</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1B2B6B;--dk:#141F4F;--or:#E8701A;--ordk:#C85D15;--lt:#ECEEF5;--tx:#1B2B6B;--t2:#6B7280;--t3:#94A3B8;--bg:#F5F6FA;--sf:#fff;--bd:#E2E8F0;--gn:#10B981;--f:'Sora',sans-serif}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}
a{color:var(--or);text-decoration:none}
.hdr{background:var(--blue);padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.hdr-logo{height:36px;border-radius:8px}
.hdr-txt{font-size:16px;font-weight:700;color:#fff}.hdr-txt span{font-weight:400;color:rgba(255,255,255,.6);font-size:13px;display:block}
.wrap{max-width:1100px;margin:0 auto;padding:32px 24px;width:100%;flex:1}
h1{font-size:28px;font-weight:700;text-align:center;margin-bottom:8px;color:var(--tx)}
.sub{text-align:center;color:var(--t2);font-size:15px;margin-bottom:32px}
/* Plan cards */
.plans{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:40px}
.plan{background:var(--sf);border:1.5px solid var(--bd);border-radius:14px;padding:24px;transition:all .2s;display:flex;flex-direction:column}
.plan:hover{border-color:var(--or);box-shadow:0 8px 24px rgba(232,112,26,.1);transform:translateY(-2px)}
.plan-tipo{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--or);margin-bottom:8px}
.plan-nome{font-size:17px;font-weight:700;margin-bottom:6px}
.plan-desc{font-size:13px;color:var(--t2);margin-bottom:14px;flex:1}
.plan-preco{font-size:28px;font-weight:700;margin-bottom:4px;color:var(--tx)}.plan-preco span{font-size:13px;font-weight:400;color:var(--t3)}
.plan-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.badge{display:inline-flex;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.badge-b{background:var(--lt);color:var(--dk)}
.badge-g{background:#ECFDF5;color:#065F46}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;background:var(--or);color:#fff;border:none;border-radius:8px;font-family:var(--f);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;width:100%}
.btn:hover{background:var(--ordk)}.btn:disabled{opacity:.5;cursor:not-allowed}
/* Modal */
.mo{display:none;position:fixed;inset:0;background:rgba(27,43,107,.6);z-index:1000;align-items:center;justify-content:center;padding:24px}
.mo.on{display:flex}
.mb{background:#fff;border-radius:16px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);position:relative}
.mc{position:absolute;top:12px;right:12px;z-index:10;width:32px;height:32px;border-radius:8px;border:none;background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center}
.mc:hover{background:var(--bd)}
.mc svg{width:16px;height:16px;stroke:var(--t2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.mo-hdr{margin-bottom:20px;padding-right:40px}
.mo-hdr h2{font-size:18px;font-weight:700;color:var(--tx);margin-bottom:4px}
.mo-hdr p{font-size:13px;color:var(--t3)}
.plan-banner{background:var(--lt);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.plan-banner-nome{font-weight:600;font-size:14px;color:var(--tx)}
.plan-banner-val{font-weight:700;color:var(--or);font-size:16px}
.fg{margin-bottom:16px}
.fl{display:block;font-size:12px;font-weight:600;color:var(--tx);margin-bottom:6px}
.fc{width:100%;height:42px;padding:0 14px;background:var(--bg);border:1.5px solid var(--bd);border-radius:8px;font-family:var(--f);font-size:14px;color:var(--tx);outline:none;transition:all .15s}
.fc:focus{background:#fff;border-color:var(--or);box-shadow:0 0 0 3px rgba(232,112,26,.1)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.msg{padding:16px 20px;border-radius:10px;font-size:14px;font-weight:500;margin-top:16px;display:none}
.msg.ok{display:block;background:#ECFDF5;border:1px solid #BBF7D0;color:#065F46}
.msg.err{display:block;background:#FEF2F2;border:1px solid #FECACA;color:#991B1B}
.sp{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ld{display:flex;align-items:center;justify-content:center;padding:48px;color:var(--t3);gap:8px;font-size:14px}
.ld .sp{border-color:var(--bd);border-top-color:var(--or)}
.ftr{text-align:center;padding:24px;font-size:12px;color:var(--t3);border-top:1px solid var(--bd);margin-top:auto}
@media(max-width:768px){
  .plans{grid-template-columns:1fr 1fr}
  .wrap{padding:24px 16px}
  h1{font-size:22px}
  .fr2{grid-template-columns:1fr}
  .mo{padding:0;align-items:flex-end}
  .mb{border-radius:16px 16px 0 0;max-height:95vh;padding:20px 16px;max-width:100%}
}
@media(max-width:480px){
  .plans{grid-template-columns:1fr}
  .plan{padding:20px}
  .plan-preco{font-size:24px}
  h1{font-size:20px}
}
</style>
</head>
<body>
<header class="hdr">
  <img src="/assets/logo-conecta-crm.png" alt="Conecta CRM" class="hdr-logo">
  <div class="hdr-txt">ACIC-DF<span>Associação Comercial</span></div>
</header>

<div class="wrap">
  <h1>Escolha seu plano</h1>
  <p class="sub">Associe-se e tenha acesso a todos os benefícios da ACIC-DF</p>

  <div class="plans" id="plans">
    <div class="ld"><div class="sp"></div> Carregando planos...</div>
  </div>
</div>

<!-- Modal Inscrição -->
<div class="mo" id="mo" onclick="if(event.target===this)fecharModal()">
  <div class="mb">
    <button class="mc" onclick="fecharModal()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    <div class="mo-hdr">
      <h2>Dados para Inscrição</h2>
      <p>Preencha seus dados e entraremos em contato</p>
    </div>
    <div class="plan-banner">
      <span class="plan-banner-nome" id="sel-nome">-</span>
      <span class="plan-banner-val" id="sel-val">-</span>
    </div>
    <form id="frm" onsubmit="return enviar(event)">
      <input type="hidden" id="f-plano" value="">
      <div class="fg"><label class="fl">Nome da Empresa *</label><input type="text" class="fc" id="f-empresa" placeholder="Razão social ou nome fantasia" required></div>
      <div class="fr2">
        <div class="fg"><label class="fl">CNPJ</label><input type="text" class="fc" id="f-cnpj" placeholder="00.000.000/0001-00"></div>
        <div class="fg"><label class="fl">Responsável *</label><input type="text" class="fc" id="f-nome" placeholder="Nome completo" required></div>
      </div>
      <div class="fr2">
        <div class="fg"><label class="fl">E-mail *</label><input type="email" class="fc" id="f-email" placeholder="contato@empresa.com.br" required></div>
        <div class="fg"><label class="fl">WhatsApp</label><input type="tel" class="fc" id="f-wpp" placeholder="(61) 99999-9999"></div>
      </div>
      <button type="submit" class="btn" id="btn-enviar">Enviar Inscrição</button>
    </form>
    <div class="msg" id="msg"></div>
  </div>
</div>

<footer class="ftr">ACIC-DF — Associação Comercial, Industrial e de Serviços de Ceilândia<br><script>document.write(new Date().getFullYear())</script></footer>

<script>
const API='https://api.acicdf.org.br';
let planos=[];

async function init(){
  try{
    const r=await fetch(API+'/planos');
    const d=await r.json();
    planos=d.data?.data||d.data||d||[];
    if(!Array.isArray(planos))planos=[];
    if(!planos.length){document.getElementById('plans').innerHTML='<div class="ld">Nenhum plano disponível no momento.</div>';return;}
    render();
    const path=location.pathname.replace(/\/+$/,'');
    const slug=path.split('/').pop();
    if(slug&&slug!=='associe-se'){
      const found=planos.find(p=>p.slug_link===slug);
      if(found)abrirModal(found);
    }
  }catch(e){
    document.getElementById('plans').innerHTML='<div class="ld" style="color:#991B1B">Erro ao carregar planos. Tente novamente.</div>';
  }
}

function money(v){return'R$ '+parseFloat(v||0).toFixed(2).replace('.',',');}

function render(){
  const tp={mei:'MEI',me:'ME',epp:'EPP',isento:'Isento',combo:'Combo',personalizado:'Personalizado'};
  document.getElementById('plans').innerHTML=planos.map(p=>`<div class="plan" id="plan-${p.id}">
    <div class="plan-tipo">${tp[p.tipo]||p.tipo}</div>
    <div class="plan-nome">${p.nome}</div>
    <div class="plan-desc">${p.descricao||'Plano de associação'}</div>
    <div class="plan-preco">${money(p.valor)} <span>/${p.periodicidade}</span></div>
    <div class="plan-badges">
      <span class="badge badge-b">${p.periodicidade}</span>
      ${p.tem_conecta?'<span class="badge badge-g">Conecta</span>':''}
    </div>
    <button class="btn" onclick="abrirModal(planos.find(x=>x.id===${p.id}))">Associar-se</button>
  </div>`).join('');
}

function abrirModal(p){
  document.getElementById('f-plano').value=p.id;
  document.getElementById('sel-nome').textContent=p.nome;
  document.getElementById('sel-val').textContent=money(p.valor)+'/'+p.periodicidade;
  document.getElementById('frm').style.display='';
  document.getElementById('msg').className='msg';
  document.getElementById('msg').style.display='none';
  document.getElementById('btn-enviar').disabled=false;
  document.getElementById('btn-enviar').textContent='Enviar Inscrição';
  ['f-empresa','f-cnpj','f-nome','f-email','f-wpp'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('mo').classList.add('on');
  document.body.style.overflow='hidden';
}

function fecharModal(){
  document.getElementById('mo').classList.remove('on');
  document.body.style.overflow='';
}

async function enviar(e){
  e.preventDefault();
  const btn=document.getElementById('btn-enviar');
  const msg=document.getElementById('msg');
  msg.className='msg';msg.style.display='none';

  const nome=document.getElementById('f-nome').value.trim();
  const email=document.getElementById('f-email').value.trim();
  const empresa=document.getElementById('f-empresa').value.trim();
  if(!empresa){msg.className='msg err';msg.textContent='Informe o nome da empresa';msg.style.display='block';return false;}
  if(!nome){msg.className='msg err';msg.textContent='Informe o nome do responsável';msg.style.display='block';return false;}
  if(!email||!email.includes('@')){msg.className='msg err';msg.textContent='Informe um e-mail válido';msg.style.display='block';return false;}

  btn.disabled=true;btn.innerHTML='<div class="sp"></div> Enviando...';

  try{
    const r=await fetch(API+'/inscricoes',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        plano_id:parseInt(document.getElementById('f-plano').value),
        nome_empresa:empresa,
        cnpj:document.getElementById('f-cnpj').value.trim()||null,
        nome_contato:nome,
        email:email,
        whatsapp:document.getElementById('f-wpp').value.trim()||null
      })
    });
    const d=await r.json();
    if(d.ok){
      document.getElementById('frm').style.display='none';
      msg.className='msg ok';
      msg.innerHTML='<strong>Inscrição recebida com sucesso!</strong><br>Entraremos em contato em breve pelo e-mail ou WhatsApp informado.';
      msg.style.display='block';
    }else{
      msg.className='msg err';msg.textContent=d.error||'Erro ao enviar. Tente novamente.';msg.style.display='block';
      btn.disabled=false;btn.textContent='Enviar Inscrição';
    }
  }catch(err){
    msg.className='msg err';msg.textContent='Erro de conexão. Verifique sua internet e tente novamente.';msg.style.display='block';
    btn.disabled=false;btn.textContent='Enviar Inscrição';
  }
  return false;
}

init();
</script>
</body>
</html>
