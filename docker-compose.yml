version: '3.9'

services:

  # ── Nginx ─────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./api/public:/var/www/api/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - web
    networks:
      - crm

  # ── PHP-FPM ───────────────────────────────────────────────
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    volumes:
      - ./api:/var/www/api
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini:ro
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-conecta_crm}
      DB_USER: ${DB_USER:-crm}
      DB_PASS: ${DB_PASS:-secret}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - crm

  # ── React (dev) ───────────────────────────────────────────
  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
    networks:
      - crm

  # ── MySQL 8 ───────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootsecret}
      MYSQL_DATABASE: ${DB_NAME:-conecta_crm}
      MYSQL_USER: ${DB_USER:-crm}
      MYSQL_PASSWORD: ${DB_PASS:-secret}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./api/database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - crm

  # ── Redis (filas de cobrança) ─────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - crm

volumes:
  mysql_data:
  redis_data:

networks:
  crm:
    driver: bridge
